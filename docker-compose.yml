services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["sh", "-c", "ollama serve & sleep 3 && ollama pull mistral && tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  inquiro:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral
    volumes:
      - .:/app
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
