services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        sleep 3
        ollama pull mistral
        wait

  inquiro:
    build: .
    network_mode: host
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./outputs:/app/outputs
    env_file: .env

volumes:
  ollama_data:
