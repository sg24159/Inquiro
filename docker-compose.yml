services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        sleep 3
        ollama pull mistral
        wait

  inquiro:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
